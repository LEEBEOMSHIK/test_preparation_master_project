spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:db}:${DB_PORT:5432}/${DB_NAME:tpmp}
    username: ${DB_USERNAME:tpmp}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false

app:
  jwt:
    secret: ${JWT_SECRET}
    access-token-expiry: 900000
    refresh-token-expiry: 604800000
  cors:
    allowed-origins: ${ALLOWED_ORIGINS}
  upload:
    path: ${UPLOAD_PATH:/uploads}
