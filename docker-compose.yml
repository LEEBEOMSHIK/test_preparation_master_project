version: '3.9'

services:
  db:
    image: postgres:15-alpine
    container_name: tpmp-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: tpmp
      POSTGRES_USER: tpmp
      POSTGRES_PASSWORD: ${DB_PASSWORD:-tpmp_local_pw}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tpmp"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: tpmp-backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: docker
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: tpmp
      DB_USERNAME: tpmp
      DB_PASSWORD: ${DB_PASSWORD:-tpmp_local_pw}
      JWT_SECRET: ${JWT_SECRET:-change_me_to_256bit_secret_in_production}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:3000}
      UPLOAD_PATH: /uploads
      MAX_FILE_SIZE: ${MAX_FILE_SIZE:-10485760}
    ports:
      - "8080:8080"
    volumes:
      - uploads:/uploads
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/api/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: tpmp-frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8080/api}
    ports:
      - "3000:3000"

  nginx:
    image: nginx:alpine
    container_name: tpmp-nginx
    restart: unless-stopped
    depends_on:
      - frontend
      - backend
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro

volumes:
  postgres_data:
  uploads:
